<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #1f2937;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      padding: 12px;
      background: #f3f4f6;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .status.processing {
      background: #dbeafe;
      color: #1e40af;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .step {
      padding: 8px 0;
      font-size: 13px;
      color: #6b7280;
      border-left: 2px solid #e5e7eb;
      padding-left: 12px;
      margin-bottom: 8px;
    }

    .step.active {
      color: #2563eb;
      border-left-color: #2563eb;
      font-weight: 500;
    }

    .step.done {
      color: #059669;
      border-left-color: #059669;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Digest</h1>

  <button id="digestBtn">Digest Article</button>

  <div id="status" class="status hidden"></div>

  <div id="progress" class="hidden">
    <div id="step1" class="step">Extracting content...</div>
    <div id="step2" class="step">Writing to Obsidian...</div>
    <div id="step3" class="step">Done!</div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
