<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body {
      width: 400px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      margin: 0;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 16px 0;
      color: #1f2937;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-bottom: 12px;
    }

    button:hover {
      background: #1d4ed8;
    }

    button:disabled {
      background: #9ca3af;
      cursor: not-allowed;
    }

    .status {
      padding: 12px;
      background: #f3f4f6;
      border-radius: 6px;
      margin-bottom: 12px;
      font-size: 13px;
    }

    .status.processing {
      background: #dbeafe;
      color: #1e40af;
    }

    .status.success {
      background: #d1fae5;
      color: #065f46;
    }

    .status.error {
      background: #fee2e2;
      color: #991b1b;
    }

    .step {
      padding: 8px 0;
      font-size: 13px;
      color: #6b7280;
      border-left: 2px solid #e5e7eb;
      padding-left: 12px;
      margin-bottom: 8px;
    }

    .step.active {
      color: #2563eb;
      border-left-color: #2563eb;
      font-weight: 500;
    }

    .step.done {
      color: #059669;
      border-left-color: #059669;
    }

    .settings {
      border-top: 1px solid #e5e7eb;
      padding-top: 16px;
      margin-top: 16px;
    }

    .settings h2 {
      font-size: 14px;
      margin: 0 0 12px 0;
      color: #1f2937;
    }

    input {
      width: 100%;
      padding: 8px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 8px;
      box-sizing: border-box;
    }

    label {
      display: block;
      font-size: 12px;
      color: #6b7280;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .hidden {
      display: none;
    }
  </style>
</head>
<body>
  <h1>Digest</h1>

  <div id="mainView">
    <button id="digestBtn">Digest Article</button>
    <button id="settingsBtn">Settings</button>

    <div id="status" class="status hidden"></div>

    <div id="progress" class="hidden">
      <div id="step1" class="step">Extracting article content...</div>
      <div id="step2" class="step">Sending to LLM...</div>
      <div id="step3" class="step">Writing to Obsidian...</div>
      <div id="step4" class="step">Done!</div>
    </div>
  </div>

  <div id="settingsView" class="hidden">
    <h2>LLM Configuration</h2>

    <label>Base URL</label>
    <input type="text" id="baseURL" placeholder="https://api.openai.com/v1">

    <label>Model</label>
    <input type="text" id="model" placeholder="gpt-4o">

    <label>API Key</label>
    <input type="password" id="apiKey" placeholder="sk-...">

    <label>Obsidian Port (optional)</label>
    <input type="number" id="obsidianPort" placeholder="27123" value="27123">

    <button id="saveSettingsBtn">Save Settings</button>
    <button id="backBtn">Back</button>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
