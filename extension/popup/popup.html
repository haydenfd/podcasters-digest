<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@1&family=Instrument+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      background: #0c0c0d;
      font-family: 'Instrument Sans', sans-serif;
      color: #ffffff;
      border: 1px solid #1f1f20;
      border-radius: 14px;
      overflow: hidden;
    }

    /* Header */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 16px 12px;
    }

    .logo {
      width: 24px;
      height: 24px;
      background: #b8f02a;
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo svg {
      width: 14px;
      height: 14px;
    }

    .title {
      font-family: 'Instrument Serif', serif;
      font-style: italic;
      font-size: 16px;
      font-weight: 400;
      color: #ffffff;
    }

    /* Tabs */
    .tabs {
      display: flex;
      padding: 0 16px;
      border-bottom: 1px solid #1f1f20;
    }

    .tab {
      flex: 1;
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 8px 0;
      text-align: center;
      color: #6b6b6b;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
    }

    .tab.active {
      color: #b8f02a;
      border-bottom-color: #b8f02a;
    }

    /* Views */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* Digest View */
    .digest-view {
      padding: 16px;
    }

    .current-page {
      margin-bottom: 16px;
    }

    .current-page-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      text-transform: uppercase;
      color: #6b6b6b;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .breathing-dot {
      width: 5px;
      height: 5px;
      background: #b8f02a;
      border-radius: 50%;
      animation: breathe 2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .current-page-url {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #ffffff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .digest-button {
      width: 100%;
      height: 40px;
      background: #b8f02a;
      color: #0c0c0d;
      border: none;
      border-radius: 8px;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    .digest-button:hover:not(:disabled) {
      background: #a3d926;
    }

    .digest-button:disabled {
      background: #171d08;
      color: #b8f02a;
      cursor: not-allowed;
    }

    .digest-button svg {
      width: 16px;
      height: 16px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #b8f02a;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .progress-block {
      display: none;
      margin-top: 16px;
      background: #111112;
      border: 1px solid #1c1c1e;
      border-radius: 8px;
      padding: 12px;
    }

    .progress-block.active {
      display: block;
    }

    .progress-phase {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #b8f02a;
      margin-bottom: 8px;
    }

    .progress-bar-container {
      width: 100%;
      height: 2px;
      background: #1c1c1e;
      border-radius: 1px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .progress-bar {
      height: 100%;
      background: #b8f02a;
      width: 0%;
      transition: width 0.3s ease;
    }

    .progress-sub {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #383839;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Library View */
    .library-view {
      max-height: 280px;
      overflow-y: auto;
      padding: 8px 0;
    }

    .library-view::-webkit-scrollbar {
      width: 2px;
    }

    .library-view::-webkit-scrollbar-track {
      background: #0c0c0d;
    }

    .library-view::-webkit-scrollbar-thumb {
      background: #1f1f20;
      border-radius: 1px;
    }

    .library-item {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 12px 16px;
      cursor: pointer;
      transition: background 0.2s;
      border-bottom: 1px solid #141415;
    }

    .library-item:last-child {
      border-bottom: none;
    }

    .library-item:hover {
      background: #111112;
    }

    .library-dot {
      width: 5px;
      height: 5px;
      background: #b8f02a;
      border-radius: 50%;
      margin-top: 6px;
      flex-shrink: 0;
    }

    .library-dot.old {
      opacity: 0.35;
    }

    .library-content {
      flex: 1;
      min-width: 0;
    }

    .library-title {
      font-family: 'Instrument Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: #ffffff;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .library-meta {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: #6b6b6b;
    }

    .library-arrow {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      margin-top: 4px;
    }

    .library-arrow svg {
      width: 100%;
      height: 100%;
    }

    .library-empty {
      text-align: center;
      padding: 40px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #6b6b6b;
    }

    .hidden {
      display: none !important;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 3h10M2 7h10M2 11h10" stroke="#0c0c0d" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
    <div class="title">Podcaster's Digest</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <div class="tab active" data-tab="digest">digest</div>
    <div class="tab" data-tab="library">library</div>
  </div>

  <!-- Digest View -->
  <div class="view active" id="digest-view">
    <div class="digest-view">
      <div class="current-page">
        <div class="current-page-label">
          <div class="breathing-dot"></div>
          current page
        </div>
        <div class="current-page-url" id="current-url">Loading...</div>
      </div>

      <button class="digest-button" id="digest-btn">
        <span id="btn-text">Digest</span>
        <svg id="btn-arrow" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M8 3l5 5-5 5M3 8h10" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <div class="spinner hidden" id="btn-spinner"></div>
      </button>

      <div class="progress-block" id="progress-block">
        <div class="progress-phase" id="progress-phase">Fetching content...</div>
        <div class="progress-bar-container">
          <div class="progress-bar" id="progress-bar"></div>
        </div>
        <div class="progress-sub" id="progress-sub">initializing</div>
      </div>
    </div>
  </div>

  <!-- Library View -->
  <div class="view" id="library-view">
    <div class="library-view">
      <div class="library-empty" id="library-empty">
        No digests yet.<br>Start by digesting your first page.
      </div>
      <div id="library-list"></div>
    </div>
  </div>

  <script src="popup.js" type="module"></script>
</body>
</html>
